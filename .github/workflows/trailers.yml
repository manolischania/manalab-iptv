- name: Generate JSON Playlist (Smart Links)
      shell: python
      run: |
        import yt_dlp
        import json

        playlists = [
            {
                "id": "PL2rB3_wxnzkSPdWlqnGO3FGmg8HObgy20", 
                "group": "Village Cinemas Trailers", 
                "logo": "https://raw.githubusercontent.com/manolischania/manalab-iptv/refs/heads/main/logo/village.png"
            },
            {
                "id": "PLEq9lv6PlXlLMyI1cxwkza0r8kcSxVxz_", 
                "group": "Feelgood Ent. Trailers", 
                "logo": "https://raw.githubusercontent.com/manolischania/manalab-iptv/refs/heads/main/logo/feelgood.png"
            },
            {
                "id": "PL7ka5nNx0eiI0axRBawYQiM69e6UChhLi", 
                "group": "Odeon Cinema Trailers", 
                "logo": "https://raw.githubusercontent.com/manolischania/manalab-iptv/refs/heads/main/logo/odeon.png"
            }
        ]

        seen_ids = set()
        banned_phrases = ["[private video]", "[deleted video]", "private video", "deleted video", "video unavailable"]
        
        # Προσθήκη 'extract_flat': 'in_playlist' για να φέρνει όλα τα βίντεο της λίστας με ασφάλεια
        ydl_opts = {'quiet': True, 'extract_flat': 'in_playlist', 'ignoreerrors': True}
        
        output_items = []

        with yt_dlp.YoutubeDL(ydl_opts) as ydl:
            for pl in playlists:
                print(f"Processing: {pl['group']}...")
                url = f"https://www.youtube.com/playlist?list={pl['id']}"
                try:
                    result = ydl.extract_info(url, download=False)
                    if 'entries' in result:
                        for video in result['entries']:
                            if not video: continue
                            
                            vid = video.get('id')
                            title = video.get('title', 'No Title')
                            
                            if not vid or vid in seen_ids: continue
                            
                            title_lower = title.lower().strip()
                            if any(phrase in title_lower for phrase in banned_phrases):
                                continue

                            seen_ids.add(vid)
                            
                            # Εξαγωγή Fanart (η μεγαλύτερη διαθέσιμη μικρογραφία)
                            thumbnails = video.get('thumbnails', [])
                            fanart = thumbnails[-1]['url'] if thumbnails else ""
                            
                            # Εξαγωγή Plot (περιγραφή). Το yt-dlp ίσως φέρει κενό στο extract_flat, αλλά αν υπάρχει το παίρνουμε.
                            plot = video.get('description') or title

                            output_items.append({
                                "video_id": vid,
                                "title": title,
                                "group": pl["group"],
                                "logo": pl["logo"],
                                "fanart": fanart,
                                "plot": plot
                            })
                            
                except Exception as e:
                    print(f"Error processing list {pl['group']}: {e}")

        # Αποθήκευση σε αρχείο JSON
        with open("trailers.json", "w", encoding="utf-8") as f:
            json.dump(output_items, f, ensure_ascii=False, indent=4)
